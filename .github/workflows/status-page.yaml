name: status-page

on:
  push:
    branches: [main]
    paths: ["web/status-page/**"]
  pull_request:
    paths: ["web/status-page/**"]

env:
  IMAGE: ghcr.io/hagaspa/bons8i/status-page

jobs:
  build:
    # arm64 ネイティブランナー（public リポは無料）。QEMU 不要
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v4

      # PR はビルド検証のみ、main への push だけ ghcr へ push
      - uses: docker/login-action@v3
        if: github.event_name == 'push'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: web/status-page
          platforms: linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag to built SHA
        working-directory: clusters/pi/status-page
        run: kustomize edit set image ${{ env.IMAGE }}:${{ github.sha }}

      - name: Create deploy PR and enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          branch="deploy/status-page-${GITHUB_SHA::7}"
          git switch -c "$branch"
          git add clusters/pi/status-page/kustomization.yaml
          git commit -m "chore(status-page): deploy ${GITHUB_SHA::7}"
          git push origin "$branch"
          gh label create deploy --color 0E8A16 --description "CI-generated deploy PR" --force
          gh pr create \
            --title "chore(status-page): deploy ${GITHUB_SHA::7}" \
            --body "Auto-generated by CI. Image: \`${IMAGE}:${GITHUB_SHA}\`" \
            --label deploy
          gh pr merge --squash --delete-branch "$branch"
