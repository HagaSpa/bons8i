kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: bons8i
networking:
  # Disable the default CNI (kindnetd). Cilium will be installed via Helm.
  disableDefaultCNI: true
  # Disable kube-proxy. Cilium replaces it via kubeProxyReplacement.
  kubeProxyMode: none
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/16"
nodes:
  - role: control-plane
  - role: worker
  - role: worker
