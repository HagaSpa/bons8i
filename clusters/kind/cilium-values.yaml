# Cilium Helm values for the kind cluster (bons8i).
# Used together with clusters/kind/kind-config.yaml which disables the default CNI and kube-proxy.

# Replace kube-proxy with Cilium's eBPF-based implementation.
kubeProxyReplacement: true

# Cilium agents need to reach the kube-apiserver directly (no kube-proxy).
# In kind, the control-plane node is reachable by its container hostname over the Docker network.
k8sServiceHost: bons8i-control-plane
k8sServicePort: 6443

# Use the Kubernetes API as the source of IPAM pod CIDRs.
ipam:
  mode: kubernetes
