apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 2.7.0
    helm:
      releaseName: external-secrets
      values: |
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 128Mi
        webhook:
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 64Mi
        certController:
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 64Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
