apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://helm.cilium.io/
    chart: cilium
    targetRevision: 1.19.5
    helm:
      releaseName: cilium
      values: |
        kubeProxyReplacement: true

        k8sServiceHost: 192.168.1.12
        k8sServicePort: 6443

        ipam:
          mode: kubernetes

        operator:
          replicas: 1
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  ignoreDifferences:
    # cilium.io/helm-template-non-idempotent: 'true' が付く Secret。
    # helm template はクラスタ状態を lookup しないため SYNC のたびに新規生成してしまう。
    - kind: Secret
      name: cilium-ca
      namespace: kube-system
      jsonPointers:
        - /data
    - kind: Secret
      name: hubble-server-certs
      namespace: kube-system
      jsonPointers:
        - /data
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
