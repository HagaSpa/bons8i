apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://helm.cilium.io/
    chart: cilium
    targetRevision: 1.19.5
    helm:
      releaseName: cilium
      values: |
        kubeProxyReplacement: true

        k8sServiceHost: 192.168.1.12
        k8sServicePort: 6443

        ipam:
          mode: kubernetes

        operator:
          replicas: 1
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
