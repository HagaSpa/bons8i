apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: forgejo
  namespace: forgejo
spec:
  serviceName: forgejo
  replicas: 1
  selector:
    matchLabels:
      app: forgejo
  template:
    metadata:
      labels:
        app: forgejo
    spec:
      containers:
        - name: forgejo
          image: codeberg.org/forgejo/forgejo:15.0
          ports:
            - name: http
              containerPort: 3000
            - name: ssh
              containerPort: 22
          env:
            - name: FORGEJO__database__DB_TYPE
              value: sqlite3
            - name: FORGEJO__database__PATH
              value: /data/gitea/forgejo.db
            - name: FORGEJO__security__INSTALL_LOCK
              value: "true"
            - name: FORGEJO__server__DOMAIN
              value: localhost
            - name: FORGEJO__server__ROOT_URL
              value: http://localhost:3000/
          envFrom:
            - secretRef:
                name: forgejo-secret
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 5Gi
