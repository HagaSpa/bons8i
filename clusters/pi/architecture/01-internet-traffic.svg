<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1560 920" width="1560" height="920" font-family="ui-sans-serif, -apple-system, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#101828" flood-opacity="0.10"/>
    </filter>
    <marker id="arrBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563EB"/>
    </marker>
    <marker id="arrOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#F6821F"/>
    </marker>
    <marker id="arrGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6B7280"/>
    </marker>
    <marker id="arrAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#D97706"/>
    </marker>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1560" height="920" fill="#F6F7F9"/>

  <!-- header -->
  <text x="48" y="62" font-size="26" font-weight="700" fill="#111827">bons8i — Internet-facing traffic</text>
  <text x="48" y="90" font-size="14" fill="#6B7280">How requests reach the single-node Raspberry Pi 5 cluster — with zero inbound ports open</text>

  <!-- legend -->
  <g font-size="12" fill="#6B7280">
    <line x1="1090" y1="56" x2="1130" y2="56" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arrBlue)"/>
    <text x="1138" y="60">user traffic</text>
    <line x1="1230" y1="56" x2="1270" y2="56" stroke="#F6821F" stroke-width="2.5" marker-end="url(#arrOrange)"/>
    <text x="1278" y="60">tunnel</text>
    <line x1="1090" y1="82" x2="1130" y2="82" stroke="#6B7280" stroke-width="2.5" marker-end="url(#arrGray)"/>
    <text x="1138" y="86">admin</text>
    <line x1="1230" y1="82" x2="1270" y2="82" stroke="#D97706" stroke-width="2.5" stroke-dasharray="6 4" marker-end="url(#arrAmber)"/>
    <text x="1278" y="86">external probe</text>
  </g>

  <!-- ===== external actors ===== -->
  <g>
    <rect x="48" y="150" width="250" height="96" rx="12" fill="#FFFFFF" stroke="#E3E6EB" filter="url(#cardShadow)"/>
    <circle cx="82" cy="184" r="14" fill="#EFF6FF" stroke="#BFDBFE"/>
    <text x="82" y="189" font-size="14" text-anchor="middle" fill="#1D4ED8" font-weight="700">👤</text>
    <text x="106" y="182" font-size="15" font-weight="600" fill="#111827">Visitor</text>
    <text x="106" y="202" font-size="12" fill="#6B7280">any browser, anywhere</text>
    <text x="66" y="230" font-size="12" fill="#6B7280">opens grafana / status page</text>
  </g>

  <g>
    <rect x="48" y="320" width="250" height="130" rx="12" fill="#FFFFFF" stroke="#E3E6EB" filter="url(#cardShadow)"/>
    <text x="66" y="350" font-size="15" font-weight="600" fill="#111827">External probe (AWS)</text>
    <text x="66" y="372" font-size="12" fill="#6B7280">EventBridge Scheduler (10 min)</text>
    <text x="66" y="390" font-size="12" fill="#6B7280">→ Lambda bons8i-external-probe</text>
    <text x="66" y="412" font-size="12" fill="#6B7280">synthetic monitoring from outside</text>
    <text x="66" y="430" font-size="12" fill="#6B7280">the cluster — see fig. 3</text>
  </g>

  <g>
    <rect x="48" y="620" width="250" height="96" rx="12" fill="#FFFFFF" stroke="#E3E6EB" filter="url(#cardShadow)"/>
    <circle cx="82" cy="654" r="14" fill="#F3F4F6" stroke="#D1D5DB"/>
    <text x="82" y="659" font-size="14" text-anchor="middle">💻</text>
    <text x="106" y="652" font-size="15" font-weight="600" fill="#111827">Operator laptop</text>
    <text x="106" y="672" font-size="12" fill="#6B7280">day-to-day operations</text>
    <text x="66" y="700" font-size="12" fill="#6B7280">ssh · kubectl · ArgoCD UI</text>
  </g>

  <!-- ===== Cloudflare zone ===== -->
  <rect x="380" y="130" width="360" height="400" rx="16" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1.5"/>
  <text x="404" y="162" font-size="12" font-weight="700" fill="#C2410C" letter-spacing="2">CLOUDFLARE</text>

  <g>
    <rect x="404" y="180" width="312" height="156" rx="12" fill="#FFFFFF" stroke="#F1D9BE" filter="url(#cardShadow)"/>
    <text x="422" y="210" font-size="15" font-weight="600" fill="#111827">Cloudflare Edge</text>
    <text x="422" y="232" font-size="12" fill="#6B7280">DNS + TLS termination for hagaspa.com</text>
    <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11.5">
      <text x="422" y="258" fill="#C2410C">grafana.hagaspa.com</text>
      <text x="422" y="278" fill="#C2410C">bons8i.hagaspa.com</text>
      <text x="422" y="298" fill="#9CA3AF">anything else → 404</text>
    </g>
    <text x="422" y="320" font-size="11" fill="#6B7280">grafana.* is gated by Cloudflare Access (login)</text>
  </g>

  <g>
    <rect x="404" y="360" width="312" height="132" rx="12" fill="#FFFFFF" stroke="#F1D9BE" filter="url(#cardShadow)"/>
    <text x="422" y="390" font-size="15" font-weight="600" fill="#111827">Cloudflare Tunnel</text>
    <text x="422" y="412" font-size="12" fill="#6B7280">connector-based: the cluster dials out,</text>
    <text x="422" y="430" font-size="12" fill="#6B7280">Cloudflare never connects in</text>
    <text x="422" y="456" font-size="12" fill="#6B7280">router / firewall: no port forwarding,</text>
    <text x="422" y="474" font-size="12" fill="#6B7280">no public IP exposure</text>
  </g>

  <!-- ===== Tailscale zone ===== -->
  <rect x="380" y="588" width="360" height="160" rx="16" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="404" y="620" font-size="12" font-weight="700" fill="#374151" letter-spacing="2">TAILSCALE</text>
  <g>
    <rect x="404" y="636" width="312" height="92" rx="12" fill="#FFFFFF" stroke="#E3E6EB" filter="url(#cardShadow)"/>
    <text x="422" y="666" font-size="15" font-weight="600" fill="#111827">WireGuard mesh VPN</text>
    <text x="422" y="688" font-size="12" fill="#6B7280">installed on the Pi host (not in-cluster);</text>
    <text x="422" y="706" font-size="12" fill="#6B7280">private overlay network for admin access</text>
  </g>

  <!-- ===== Cluster zone ===== -->
  <rect x="830" y="130" width="690" height="640" rx="16" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1.5"/>
  <text x="854" y="162" font-size="12" font-weight="700" fill="#4338CA" letter-spacing="2">RASPBERRY PI 5 — SINGLE-NODE KUBERNETES (KUBEADM)</text>

  <g>
    <rect x="854" y="188" width="290" height="130" rx="12" fill="#FFFFFF" stroke="#D7DCF5" filter="url(#cardShadow)"/>
    <text x="872" y="218" font-size="15" font-weight="600" fill="#111827">cloudflared</text>
    <text x="1004" y="218" font-size="11" fill="#818CF8" font-family="ui-monospace, 'SF Mono', Menlo, monospace">ns: cloudflared</text>
    <text x="872" y="240" font-size="12" fill="#6B7280">tunnel connector Deployment (1 replica)</text>
    <text x="872" y="258" font-size="12" fill="#6B7280">routes hostnames to in-cluster Services</text>
    <text x="872" y="284" font-size="12" fill="#6B7280">credentials via ExternalSecret — fig. 2</text>
  </g>

  <g>
    <rect x="1210" y="176" width="286" height="106" rx="12" fill="#FFFFFF" stroke="#D7DCF5" filter="url(#cardShadow)"/>
    <text x="1228" y="206" font-size="15" font-weight="600" fill="#111827">Grafana</text>
    <text x="1310" y="206" font-size="11" fill="#818CF8" font-family="ui-monospace, 'SF Mono', Menlo, monospace">ns: monitoring</text>
    <text x="1228" y="228" font-size="12" fill="#6B7280">dashboards (VictoriaMetrics stack)</text>
    <text x="1228" y="250" font-size="11.5" fill="#6B7280" font-family="ui-monospace, 'SF Mono', Menlo, monospace">svc vmks-grafana :80</text>
  </g>

  <g>
    <rect x="1210" y="314" width="286" height="106" rx="12" fill="#FFFFFF" stroke="#D7DCF5" filter="url(#cardShadow)"/>
    <text x="1228" y="344" font-size="15" font-weight="600" fill="#111827">status-page</text>
    <text x="1330" y="344" font-size="11" fill="#818CF8" font-family="ui-monospace, 'SF Mono', Menlo, monospace">ns: status-page</text>
    <text x="1228" y="366" font-size="12" fill="#6B7280">public status site — Rust BFF + React</text>
    <text x="1228" y="388" font-size="11.5" fill="#6B7280" font-family="ui-monospace, 'SF Mono', Menlo, monospace">svc status-page :80 → :8080</text>
  </g>

  <g>
    <rect x="854" y="620" width="642" height="138" rx="12" fill="#FFFFFF" stroke="#D7DCF5" filter="url(#cardShadow)"/>
    <text x="872" y="650" font-size="15" font-weight="600" fill="#111827">Host / control plane</text>
    <text x="872" y="672" font-size="12" fill="#6B7280">Ubuntu Server arm64 · kubeadm + containerd · Cilium (eBPF)</text>
    <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11.5" fill="#6B7280">
      <text x="872" y="698">sshd (admin)</text>
      <text x="1030" y="698">kube-apiserver 192.168.1.12:6443</text>
    </g>
    <text x="872" y="720" font-size="12" fill="#6B7280">static IP pinned by a netplan config on the host (dhcp4: false)</text>
    <text x="872" y="742" font-size="12" fill="#6B7280">private RFC1918 address — reachable only over Tailscale or LAN, never from the internet</text>
  </g>

  <!-- ===== flows ===== -->
  <!-- visitor -> edge -->
  <path d="M 298 194 C 340 194, 350 218, 400 224" fill="none" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arrBlue)"/>
  <text x="308" y="182" font-size="12" fill="#2563EB" font-weight="600">HTTPS</text>
  <text x="304" y="240" font-size="11" fill="#6B7280">TLS ends at edge</text>

  <!-- probe -> edge -->
  <path d="M 298 372 C 340 372, 350 310, 400 288" fill="none" stroke="#D97706" stroke-width="2.5" stroke-dasharray="6 4" marker-end="url(#arrAmber)"/>
  <text x="310" y="330" font-size="11" fill="#D97706">GET / ×3</text>

  <!-- edge -> tunnel (inside zone) -->
  <path d="M 560 336 L 560 356" fill="none" stroke="#F6821F" stroke-width="2.5" marker-end="url(#arrOrange)"/>

  <!-- tunnel <-> cloudflared -->
  <path d="M 716 400 C 780 400, 790 280, 850 256" fill="none" stroke="#F6821F" stroke-width="2.5" marker-end="url(#arrOrange)"/>
  <text x="742" y="332" font-size="12" fill="#C2410C" font-weight="600">requests</text>
  <path d="M 854 300 C 800 320, 790 430, 722 444" fill="none" stroke="#F6821F" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrOrange)"/>
  <text x="742" y="428" font-size="11" fill="#C2410C">outbound-only</text>
  <text x="742" y="444" font-size="11" fill="#C2410C">tunnel, dialed</text>
  <text x="742" y="460" font-size="11" fill="#C2410C">from cluster</text>

  <!-- cloudflared -> grafana / status-page -->
  <path d="M 1144 230 L 1204 230" fill="none" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arrBlue)"/>
  <text x="1150" y="218" font-size="10.5" fill="#6B7280" font-family="ui-monospace, 'SF Mono', Menlo, monospace">grafana.*</text>
  <path d="M 1144 286 C 1180 300, 1180 340, 1204 356" fill="none" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arrBlue)"/>
  <text x="1150" y="324" font-size="10.5" fill="#6B7280" font-family="ui-monospace, 'SF Mono', Menlo, monospace">bons8i.*</text>

  <!-- operator -> tailscale -> host -->
  <path d="M 298 668 L 398 674" fill="none" stroke="#6B7280" stroke-width="2.5" marker-end="url(#arrGray)"/>
  <path d="M 716 682 L 848 682" fill="none" stroke="#6B7280" stroke-width="2.5" marker-end="url(#arrGray)"/>
  <text x="748" y="670" font-size="12" fill="#6B7280" font-weight="600">ssh · kubectl</text>

  <!-- ===== callout ===== -->
  <rect x="48" y="800" width="1472" height="80" rx="12" fill="#FFFFFF" stroke="#E3E6EB" filter="url(#cardShadow)"/>
  <text x="72" y="832" font-size="14" font-weight="700" fill="#111827">🔒 Zero inbound ports</text>
  <text x="72" y="858" font-size="12.5" fill="#6B7280">Every internet-crossing connection is initiated from inside: cloudflared dials the tunnel, ArgoCD pulls manifests from GitHub and ESO pulls secrets from AWS SSM (fig. 2), backup CronJobs push to S3 (fig. 3). Nothing on the internet can connect directly to the Pi.</text>
</svg>
